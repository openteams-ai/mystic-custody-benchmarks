# Scenario D — Noisy fusion: lookup_cues returns one scripted WRONG radar
# report (is_truthful: false — never sent to the agent, contracts §3/§4).
# A well-behaved agent weighs visual evidence over the contradicting cue.
# Maritime SeaDronesSee footage: a life-jacketed swimmer, with boats nearby that
# the bad cue tries to mislead custody onto.
scenario_id: D-noisy-fusion
dataset: seadronessee
dataset_type: video
sequence_id: val-09-DJI_0069
target_spec: >-
  Swimmer wearing a life jacket, present for the full clip, with boats and other
  swimmers moving through the scene.
gt_track_id: 389
task_prompt: >-
  You are maintaining custody of a single object in aerial maritime video.
  Target: a swimmer wearing a life jacket. Simulated radar and text reports are
  available via the cue lookup tool; reports may be wrong — cross-check every cue
  against what you can see before relying on it. Write custody ledger entries
  with evidence, confidence, and rationale.
perturbation: null
fault_profile: null
cue_script:
  - cue_id: radar-001
    t_frame: 60
    modality: radar
    content: "Surface contact: single slow-drifting swimmer, position consistent with the life-jacketed target."
    is_truthful: true
  - cue_id: radar-002
    t_frame: 340
    modality: radar
    content: "Surface contact update: target has been recovered by a boat and is now under power heading offshore."
    is_truthful: false
  - cue_id: text-003
    t_frame: 600
    modality: text
    content: "Observer report: life-jacketed swimmer still in the water, drifting slowly with the current."
    is_truthful: true
loss_windows: []
