# Scenario E — DDIL: the fault proxy injects jittered latency, BURSTY 503s
# (correlated outages, not independent per-call drops), and a hard failure of
# inspect_crop after 6 calls (contracts §3 FaultProfile, §4 proxy). A lone boat
# on maritime SeaDronesSee footage — a single unambiguous target, so all of the
# difficulty comes from the degraded comms rather than the scene.
scenario_id: E-ddil
dataset: seadronessee
sequence_id: val-19-DJI_0003
target_spec: >-
  A single boat under way in open water, the only tracked object in the clip.
gt_track_id: 611
task_prompt: >-
  You are maintaining custody of a single object in aerial maritime video.
  Target: a boat under way in open water. Tool calls may be slow or fail under
  degraded communications; retry or adapt your plan when a tool fails, and never
  fabricate a custody entry you cannot support with evidence. Write custody
  ledger entries with evidence, confidence, and rationale.
perturbation: null
fault_profile:
  rules:
    # Bursty, jittered outages: when a 503 fires it lasts ~3 consecutive calls
    # (a sustained outage), with ±1.5s latency jitter on top of the 4s base.
    - tool: detect_track
      latency_ms: 4000
      latency_jitter_ms: 1500
      error_rate: 0.4
      burst_len: 3
      fail_after_n_calls: null
    - tool: sample_frames
      latency_ms: 1500
      latency_jitter_ms: 500
      error_rate: 0.0
      fail_after_n_calls: null
    - tool: inspect_crop
      latency_ms: 0
      error_rate: 0.0
      fail_after_n_calls: 6
cue_script: []
loss_windows: []
