# Scenario C — Confuser: sequence chosen for a visually similar same-class
# neighbor; NRTK blur stacked over the mid-clip to make discrimination harder.
# Maritime SeaDronesSee footage: two life-jacketed swimmers drift close together
# in a cluster of swimmers, so the agent must verify identity, not just class.
scenario_id: C-confuser
dataset: seadronessee
sequence_id: val-16-DJI_0006_d3
target_spec: >-
  Life-jacketed swimmer present from the start of the clip; a second, nearly
  identical life-jacketed swimmer drifts close by for most of the run, amid a
  cluster of other swimmers.
gt_track_id: 508
task_prompt: >-
  You are maintaining custody of a single object in aerial maritime video.
  Target: a swimmer wearing a life jacket, the one present from the opening of
  the clip. Warning: at least one visually similar life-jacketed swimmer is
  nearby and other swimmers are in the water; verify identity with crop
  inspection before each custody claim rather than relying on class alone. Write
  custody ledger entries with evidence, confidence, and rationale.
perturbation:
  kind: nrtk
  name: GaussianBlurPerturber
  params:
    ksize: 7
  frame_start: 120
  frame_end: 240
fault_profile: null
cue_script: []
